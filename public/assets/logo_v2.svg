<svg width="350" height="100" viewBox="0 0 350 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Centered Minimalist Ayu-Dag & Sea Silhouette -->
    <g transform="translate(115, 10)">
        <path d="M0 30 L20 15 L45 28 L60 22 L80 35" stroke="url(#goldGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M0 38 H80" stroke="url(#goldGradient)" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Centered Text in White for better visibility on video -->
    <text x="175" y="75" font-family="'Montserrat', sans-serif" font-weight="700" font-size="38" fill="#FFFFFF" text-anchor="middle" style="letter-spacing: 2px;">
        Альмари
    </text>
    <text x="175" y="94" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#FFFFFF" text-anchor="middle" style="letter-spacing: 15px; text-transform: uppercase;">
        Гурзуф
    </text>
</svg>
