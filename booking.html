    <script type="text/javascript">
        let bnovoInitialized = false;

        function initBnovo() {
            if (bnovoInitialized || typeof BookingIframe === 'undefined') {
                if (!bnovoInitialized && typeof BookingIframe === 'undefined') {
                    setTimeout(initBnovo, 100);
                }
                return;
            }

            bnovoInitialized = true;
            const params = new URLSearchParams(window.location.search);
            
            // Премиальные стили для модуля Bnovo
            const luxuryBnovoCss = `
                :root { --primary-color: #0093E9; }
                body { font-family: 'Inter', sans-serif !important; }
                .card__title, h1, h2 { font-family: 'Montserrat', sans-serif !important; font-weight: 700 !important; }
                .action_primary, .button_primary, .service-cart-modern__main .action_close {

                    border: none !important;
                    border-radius: 12px !important;
                    text-transform: uppercase !important;
                    font-weight: 700 !important;
                }
                .card { border-radius: 20px !important; border: 1px solid #eee !important; box-shadow: 0 10px 30px rgba(0,0,0,0.05) !important; }
                .bnovo_link { display: none !important; }
            `;
            
            const cssUrl = "data:text/css;base64," + btoa(unescape(encodeURIComponent(luxuryBnovoCss)));

            var BnovoBookFrame = new BookingIframe({
              html_id: 'booking_iframe',
              uid: '2610f035-3b01-4cd0-9bd1-7298c9817370',
              lang: 'ru',
              width: 'auto',
              height: 'auto',
              dfrom: params.get('dfrom') || '',
              dto: params.get('dto') || '',
              adults: params.get('adults') || '2',
              css_url: cssUrl
            });
            BnovoBookFrame.init();

            // Плавное проявление после инициализации
            const checkLoad = setInterval(() => {
                const iframe = document.querySelector('#booking_iframe iframe');
                if (iframe) {
                    clearInterval(checkLoad);
                    iframe.setAttribute('title', 'Модуль бронирования апартаментов Альмари Гурзуф');
                    document.getElementById('booking_iframe').classList.add('loaded');
                    const loader = document.getElementById('booking_loader');
                    if (loader) loader.style.display = 'none';
                }
            }, 100);
        }

        document.getElementById('bnovo_script').addEventListener('load', initBnovo);
        setTimeout(initBnovo, 1000);
    </script>
