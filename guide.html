<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путеводитель по Гурзуфу | Альмари</title>
    <meta name="description"
        content="Рекомендации от Альмари Гурзуф — лучшие рестораны, магазины, достопримечательности и важные адреса рядом с нами.">

    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="shortcut icon" href="/favicon.ico">

    <!-- Preload Icons Font for faster FCP/LCP -->
    <link rel="preload" href="/assets/fonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/fa-regular-400.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- Preload Main Fonts -->
    <link rel="preload" href="/assets/fonts/inter-cyrillic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/montserrat-cyrillic.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Локальные шрифты и иконки -->
    <link rel="stylesheet" href="/src/assets/css/local-fonts.css">
    <link rel="stylesheet" href="/src/assets/css/fontawesome-subset.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="/src/assets/css/fontawesome-guide-extra.css" media="print" onload="this.media='all'">

    <style>
        :root {
            --primary-blue: #0093E9;
            --text-dark: #1a2a3a;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            color: var(--text-dark);
            background: #f9fbfd;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background: #1a2a3a !important;
            position: relative !important;
        }

        header .logo-text,
        header .logo-text-sub {
            fill: white !important;
        }

        header .nav-links a {
            color: white !important;
        }

        /* В мобильном оверлее текст тёмный (белый фон) */
        @media (max-width: 1280px) {
            header .nav-links a {
                color: #1a2a3a !important;
            }
        }

        header .mobile-menu-toggle {
            color: white !important;
        }

        header .mobile-menu-toggle i {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0093E9, #006bb3);
            color: white;
        }
    </style>

    <link rel="stylesheet" href="/src/sections/common/variables.css">
    <link rel="stylesheet" href="/src/sections/common/base.css">
    <link rel="stylesheet" href="/src/sections/header/header.css">
    <link rel="stylesheet" href="/src/sections/footer/footer.css">
    <link rel="stylesheet" href="/src/sections/cookie/cookie.css">
    <link rel="stylesheet" href="/src/sections/widget/widget.css">
    <link rel="stylesheet" href="/src/sections/guide/guide.css">
</head>

<body class="guide-page">

    {{> header/header}}

    {{> guide/guide-hero}}

    {{> guide/guide-nav}}


    {{> guide/guide-modal}}

    {{> footer/footer}}
    {{> cookie/cookie}}
    {{> widget/widget}}

    <script type="module" src="/src/main.js"></script>
</body>

</html>
